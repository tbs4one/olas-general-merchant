<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="OLAS Technologies & General Merchandise Logo">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8e4f5"/>
      <stop offset="50%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#5eb3d9"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4a7a"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
  </defs>

  <!-- Outer tech hexagon ring -->
  <polygon points="180,28 288,90 288,214 180,276 72,214 72,90" fill="#0a2540" stroke="url(#sky)" stroke-width="8"/>
  <polygon points="180,52 268,102 268,202 180,252 92,202 92,102" fill="none" stroke="#12355c" stroke-width="3"/>

  <!-- Circuit nodes around hex -->
  <circle cx="180" cy="28" r="7" fill="#87ceeb"/>
  <circle cx="288" cy="90" r="6" fill="#5eb3d9"/>
  <circle cx="288" cy="214" r="6" fill="#87ceeb"/>
  <circle cx="180" cy="276" r="7" fill="#5eb3d9"/>
  <circle cx="72" cy="214" r="6" fill="#87ceeb"/>
  <circle cx="72" cy="90" r="6" fill="#5eb3d9"/>

  <!-- Tech chip / circuit board mark -->
  <rect x="118" y="108" width="124" height="88" rx="10" fill="url(#navy)" stroke="url(#sky)" stroke-width="3"/>
  <rect x="132" y="122" width="96" height="60" rx="4" fill="#061829"/>

  <!-- Circuit traces -->
  <g fill="none" stroke="#87ceeb" stroke-width="2.5" stroke-linecap="round">
    <path d="M148 142 H180"/>
    <path d="M180 142 V162 H212"/>
    <path d="M148 162 H168"/>
    <path d="M200 142 H212"/>
  </g>
  <circle cx="148" cy="142" r="4" fill="#5eb3d9"/>
  <circle cx="212" cy="162" r="4" fill="#b8e4f5"/>
  <circle cx="168" cy="162" r="3.5" fill="#87ceeb"/>
  <circle cx="212" cy="142" r="3.5" fill="#5eb3d9"/>

  <!-- Merchandise tag corner (tech + trade) -->
  <path d="M232 118 L252 118 L252 148 L242 158 L232 148 Z" fill="url(#sky)"/>
  <circle cx="242" cy="130" r="3.5" fill="#0a2540"/>

  <!-- OLAS wordmark -->
  <rect x="70" y="292" width="220" height="36" rx="6" fill="url(#navy)"/>
  <text x="180" y="318" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="26" fill="#e8f6fc" letter-spacing="5">OLAS</text>

  <!-- Full company name -->
  <text x="180" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="9" fill="#3d5f7a" letter-spacing="1.2">TECHNOLOGIES &amp; GENERAL MERCHANDISE</text>
</svg>
