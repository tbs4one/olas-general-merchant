<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Olas General Merchant Logo">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8e4f5"/>
      <stop offset="55%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#5eb3d9"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e4a7a"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
  </defs>

  <!-- Flat seal background -->
  <circle cx="160" cy="142" r="118" fill="#0a2540"/>
  <circle cx="160" cy="142" r="118" fill="none" stroke="url(#sky)" stroke-width="10"/>
  <circle cx="160" cy="142" r="102" fill="none" stroke="#12355c" stroke-width="4"/>

  <!-- Market awning crown -->
  <path d="M70 118 H250 L238 88 H82 Z" fill="url(#sky)"/>
  <g fill="#0a2540" opacity="0.22">
    <rect x="92" y="88" width="14" height="30"/>
    <rect x="120" y="88" width="14" height="30"/>
    <rect x="148" y="88" width="14" height="30"/>
    <rect x="176" y="88" width="14" height="30"/>
    <rect x="204" y="88" width="14" height="30"/>
  </g>
  <path d="M82 88 H238" fill="none" stroke="#e8f6fc" stroke-width="3"/>

  <!-- Monogram O as merchant bag -->
  <circle cx="160" cy="158" r="48" fill="none" stroke="url(#sky)" stroke-width="14"/>
  <path d="M138 128 Q160 108 182 128" fill="none" stroke="url(#sky)" stroke-width="8" stroke-linecap="round"/>
  <!-- Goods marks inside O -->
  <ellipse cx="148" cy="162" rx="8" ry="14" fill="#87ceeb"/>
  <rect x="162" y="150" width="10" height="22" rx="3" fill="#5eb3d9"/>
  <rect x="164" y="146" width="6" height="5" rx="1" fill="#b8e4f5"/>
  <path d="M178 156 H194 V176 H178 Z" fill="#87ceeb"/>
  <path d="M178 162 H194" stroke="#0a2540" stroke-width="2"/>
  <path d="M186 156 V176" stroke="#0a2540" stroke-width="2"/>

  <!-- Wordmark banner -->
  <rect x="58" y="232" width="204" height="44" rx="6" fill="url(#navy)"/>
  <text x="160" y="263" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="30" fill="#e8f6fc" letter-spacing="6">OLAS</text>

  <!-- Subtitle -->
  <text x="160" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#3d5f7a" letter-spacing="2.5">GENERAL MERCHANT &amp; STORE</text>
</svg>
