<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="Olas General Merchant and Store Logo">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8e4f5"/>
      <stop offset="50%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#5eb3d9"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4a7a"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
  </defs>

  <!-- Seal -->
  <circle cx="180" cy="150" r="118" fill="#0a2540"/>
  <circle cx="180" cy="150" r="118" fill="none" stroke="url(#sky)" stroke-width="8"/>
  <circle cx="180" cy="150" r="102" fill="none" stroke="#12355c" stroke-width="3"/>

  <!-- Store awning -->
  <path d="M90 128 H270 L256 96 H104 Z" fill="url(#sky)"/>
  <g fill="#0a2540" opacity="0.22">
    <rect x="114" y="96" width="14" height="32"/>
    <rect x="142" y="96" width="14" height="32"/>
    <rect x="170" y="96" width="14" height="32"/>
    <rect x="198" y="96" width="14" height="32"/>
    <rect x="226" y="96" width="14" height="32"/>
  </g>

  <!-- Building -->
  <rect x="110" y="128" width="140" height="100" rx="6" fill="url(#navy)"/>
  <rect x="155" y="168" width="50" height="60" rx="3" fill="url(#sky)"/>
  <rect x="122" y="145" width="28" height="22" rx="2" fill="#87ceeb" opacity="0.75"/>
  <rect x="210" y="145" width="28" height="22" rx="2" fill="#87ceeb" opacity="0.75"/>

  <!-- Wordmark -->
  <rect x="70" y="288" width="220" height="36" rx="6" fill="url(#navy)"/>
  <text x="180" y="314" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="26" fill="#e8f6fc" letter-spacing="5">OLAS</text>
  <text x="180" y="346" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#3d5f7a" letter-spacing="1.5">GENERAL MERCHANT AND STORE</text>
</svg>
